<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UiPath Timeline</title>

<style>
body {
  font-family: Arial;
  background: #f6f8fb;
  padding: 30px;
}

.container {
  display: flex;
  gap: 20px;
  overflow-x: auto;
}

.card {
  width: 260px;
  background: #fff;
  padding: 16px;
  border-radius: 14px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.12);
  cursor: grab;
}

.node {
  padding: 10px;
  border-radius: 8px;
  min-width: 120px;
  text-align: center;
  box-shadow: 0 3px 10px rgba(0,0,0,0.1);
  cursor: pointer;
}

.active {
  background: #16a34a;
  color: white;
}
</style>
</head>

<body>

<h1 id="title">UiPath Transformation Timeline 2026</h1>

<button onclick="year--">-</button>
<span id="year">2026</span>
<button onclick="year++">+</button>

<div id="timeline" class="container"></div>

<div id="details"></div>

<h2>Architecture Flow</h2>
<div id="nodes" style="display:flex;justify-content:space-between"></div>

<canvas id="flow"></canvas>

<script>
let year = 2026;

const base = ["July","August","September","Oct–Nov","Dec"];

const nodes = [
  "Test Manager",
  "Orchestrator",
  "Jira",
  "Confluence",
  "UiPath Studio",
  "SAP Systems"
];

let active = [];
let selected = null;

let data = [
  {id:1,title:"Stage 1",details:"Core setup & platform"},
  {id:2,title:"Stage 2",details:"Jira integration"},
  {id:3,title:"Stage 3",details:"Automation rollout"},
  {id:4,title:"Stage 4",details:"SAP SF automation"},
  {id:5,title:"Stage 5",details:"S/4HANA expansion"}
];

function slots() {
  return base.map((m,i) =>
    i===4 ? `Dec ${year} → ${year+1}+` : `${m} ${year}`
  );
}

function drawTimeline() {
  const el = document.getElementById("timeline");
  el.innerHTML = "";
  const s = slots();

  data.forEach((e,i) => {
    const d = document.createElement("div");
    d.className = "card";

    d.innerHTML = `
      <div style="color:#3b82f6;font-weight:bold">${s[i]}</div>
      <h3>${e.title}</h3>
      <p>${e.details}</p>
    `;

    d.onclick = () => {
      selected = e;
      showDetails(i);
    };

    el.appendChild(d);
  });
}

function showDetails(index) {
  const s = slots();
  document.getElementById("details").innerHTML = `
    <div style="margin-top:20px;background:white;padding:20px;border-radius:14px">
      <h2>${data[index].title}</h2>
      <b>${s[index]}</b>
      <p>${data[index].details}</p>
      <button onclick="clearDetails()">Close</button>
    </div>
  `;
}

function clearDetails(){
  document.getElementById("details").innerHTML = "";
}

function toggle(node){
  if(active.includes(node)){
    active = active.filter(x=>x!==node);
  } else {
    active.push(node);
  }
  drawNodes();
}

function drawNodes(){
  const el = document.getElementById("nodes");
  el.innerHTML="";

  nodes.forEach(n=>{
    const d=document.createElement("div");
    d.className="node "+(active.includes(n)?"active":"");
    d.innerText=n;
    d.onclick=()=>toggle(n);
    el.appendChild(d);
  });
}

function updateHeader(){
  document.getElementById("year").innerText = year;
  document.getElementById("title").innerText =
    "UiPath Transformation Timeline " + year;
}

// canvas flow
const c = document.getElementById("flow");
const ctx = c.getContext("2d");

function resize(){
  c.width = window.innerWidth - 60;
  c.height = 80;
}
resize();
window.onresize = resize;

let offset = 0;

function animate(){
  ctx.clearRect(0,0,c.width,c.height);

  for(let i=0;i<nodes.length-1;i++){
    if(active.includes(nodes[i]) && active.includes(nodes[i+1])){
      ctx.setLineDash([6,6]);
      ctx.lineDashOffset = -offset;

      ctx.beginPath();
      ctx.moveTo((i/(nodes.length-1))*c.width,40);
      ctx.lineTo(((i+1)/(nodes.length-1))*c.width,40);
      ctx.strokeStyle="#3b82f6";
      ctx.stroke();
    }
  }

  offset++;
  requestAnimationFrame(animate);
}

animate();

setInterval(()=>{
  updateHeader();
  drawTimeline();
},500);

drawTimeline();
drawNodes();
updateHeader();

</script>

</body>
</html>
